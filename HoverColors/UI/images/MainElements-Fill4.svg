<!-- File: MainElements-Fill.svg -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="32"
     height="32"
     viewBox="0 0 32 32"
     role="img"
     aria-label="House filled panels icon">

  <g id="house-icon"
     transform="translate(16 16.25) scale(0.95) translate(-16 -16)">

    <!-- Blue filled panels -->
    <g id="house-panels" fill="#1E83AA">
      <!-- Front gable triangle -->
      <polygon
        id="front-gable-panel"
        points="4,9.185 9.4,4.55 16,15.176" />

      <!-- Roof panel -->
      <polygon
        id="roof-panel"
        points="9.4,4.55 21.351,1.248 28.005,9.561 16,15.176" />

      <!-- Left wall panel -->
      <polygon
        id="left-wall-panel"
        points="4,9.185 16,15.176 16,29.563 4,23.561" />

      <!-- Right wall panel -->
      <polygon
        id="right-wall-panel"
        points="16,15.176 28.005,9.561 28.005,23.561 16,29.563" />
    </g>

    <!-- Outer shell -->
    <g id="outer-shell"
       fill="none"
       stroke="#FFFFFF"
       stroke-width="2.15"
       stroke-linecap="round"
       stroke-linejoin="round">
      <path d="M4 9.185
               L9.4 4.55
               L21.351 1.248
               L28.005 9.561
               L28.005 23.561
               L16 29.563
               L4 23.561
               Z"/>
    </g>

    <!-- Inner divider lines -->
    <g id="inner-dividers"
       fill="none"
       stroke="#FFFFFF"
       stroke-width="1.7"
       stroke-linecap="round"
       stroke-linejoin="round">
      <!-- Bottom edge of triangle / top edge of lower panels -->
      <path d="M4 9.185
               L16 15.176
               L28.005 9.561"/>

      <!-- Triangle right side + center wall edge -->
      <path d="M9.4 4.55
               L16 15.176
               L16 29.563"/>
    </g>
  </g>
</svg>

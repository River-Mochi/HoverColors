<!-- File: LotTool.svg -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="40"
     height="40"
     viewBox="0 0 40 40"
     role="img"
     aria-label="Lot tool icon">

  <!-- Small right shift -->
  <g transform="translate(0.8 0)">

    <!-- Clockwise rotation + safe scale-up -->
    <g transform="translate(20 20) rotate(8) scale(1.16) translate(-20 -20)">

      <!-- Outer frame -->
      <polygon
        fill="#a6a1a1"
        points="2.5,18.88 19.91,34.32 36.1,23.34 36.1,21.72 2.5,17.28" />

      <!-- Main lot shape -->
      <polygon
        fill="#659248"
        stroke="#fff"
        stroke-width="1.5"
        stroke-linejoin="round"
        points="4.18,17.35 18.51,8.15 34.43,21.52 19.97,30.89" />

      <!-- Corner highlights -->
      <g fill="#fff">
        <ellipse cx="5"  cy="17" rx="3.35" ry="2.25" />
        <ellipse cx="18" cy="9"  rx="3.35" ry="2.25" />
        <ellipse cx="34" cy="22" rx="3.35" ry="2.25" />
        <ellipse cx="20" cy="31" rx="3.35" ry="2.25" />
      </g>

    </g>
  </g>
</svg>

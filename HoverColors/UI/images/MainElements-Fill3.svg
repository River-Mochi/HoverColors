<!-- File: MainElements-Fill.svg -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="32"
     height="32"
     viewBox="0 0 32 32"
     role="img"
     aria-label="House filled panels icon">

  <g id="house-icon"
     transform="translate(16 16.25) scale(0.95) translate(-16 -16)">

    <!-- Blue interior panels -->
    <g id="house-panels" fill="#1E83AA">
      <!-- Front gable / left upper triangle -->
      <polygon
        id="front-gable-panel"
        points="4,9.185 10.054,4.927 16,15.176" />

      <!-- Roof panel -->
      <polygon
        id="roof-panel"
        points="10.054,4.927 21.351,1.248 28.005,9.561 16,15.176" />

      <!-- Left wall panel -->
      <polygon
        id="left-wall-panel"
        points="4,9.185 16,15.176 16,29.563 4,23.561" />

      <!-- Right wall panel -->
      <polygon
        id="right-wall-panel"
        points="16,15.176 28.005,9.561 28.005,23.561 16,29.563" />
    </g>

    <!-- White outline + dividers -->
    <g id="house-lines"
       fill="none"
       stroke="#FFFFFF"
       stroke-width="2.35"
       stroke-linecap="round"
       stroke-linejoin="round">

      <!-- Outer shell -->
      <path d="M4 9.185
               L10.054 4.927
               L21.351 1.248
               L28.005 9.561
               L28.005 23.561
               L16 29.563
               L4 23.561
               Z"/>

      <!-- Upper edges -->
      <path d="M4 9.185
               L16 15.176
               L28.005 9.561"/>

      <!-- Roof divider and center wall edge -->
      <path d="M10.054 4.927
               L16 15.176
               L16 29.563"/>
    </g>
  </g>
</svg>
